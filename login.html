<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0a0e1a;
    --surface: #0f1628;
    --border: #1e2d4a;
    --accent: #00d4ff;
    --accent2: #7b2fff;
    --text: #e2e8f0;
    --muted: #64748b;
    --danger: #ff4757;
    --success: #00d68f;
  }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 50%, rgba(0,212,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 60%, rgba(123,47,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .login-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 60px rgba(0,212,255,0.06), 0 0 120px rgba(123,47,255,0.04);
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    border-radius: 20px 20px 0 0;
  }

  .logo {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(123,47,255,0.15));
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 32px;
  }

  .logo h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    direction: ltr;
    text-align: right;
    transition: all 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--accent);
    background: rgba(0,212,255,0.04);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-login:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,212,255,0.25);
  }

  .btn-login:active { transform: translateY(0); }

  .btn-login.loading { opacity: 0.7; pointer-events: none; }

  .error-msg {
    background: rgba(255,71,87,0.1);
    border: 1px solid rgba(255,71,87,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--danger);
    margin-top: 12px;
    display: none;
    text-align: center;
  }

  .hint {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
  }

  .hint span {
    color: var(--accent);
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <h1>لوحة التحكم</h1>
    <p>بوت المبرمج الذكي</p>
  </div>

  <div class="form-group">
    <label>كلمة المرور</label>
    <input type="password" id="password" placeholder="أدخل كلمة المرور..." onkeydown="if(event.key==='Enter') login()">
  </div>

  <button class="btn-login" onclick="login()" id="loginBtn">🔐 دخول</button>
  <div class="error-msg" id="errorMsg"></div>

  <div class="hint">كلمة المرور الافتراضية: <span>admin123</span></div>
</div>

<script>
async function login() {
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  
  if (!password) { showError('يرجى إدخال كلمة المرور'); return; }
  
  btn.textContent = '⏳ جاري التحقق...';
  btn.classList.add('loading');
  err.style.display = 'none';
  
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password})
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/';
    } else {
      showError(data.error || 'كلمة المرور غير صحيحة');
    }
  } catch(e) {
    showError('خطأ في الاتصال بالسيرفر');
  }
  
  btn.textContent = '🔐 دخول';
  btn.classList.remove('loading');
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg;
  err.style.display = 'block';
}
</script>
</body>
</html>
